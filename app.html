<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SI Rate Book — Geotechnical Quotation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #000000;
    --bg-2: #0b1110;
    --panel: #0a0f0e;
    --panel-2: #101716;
    --line: rgba(245,248,248,0.10);
    --line-strong: rgba(245,248,248,0.22);
    --ink: #f5f8f8;
    --ink-muted: #7c8a8a;
    --amber: #2fe3c4;
    --teal: #58c2b0;
    --red: #d95c4a;
    --grey: #4a5656;
    font-size: 15px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter',sans-serif;
    background-image: radial-gradient(rgba(245,248,248,0.07) 1px, transparent 1px);
    background-size: 26px 26px;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  header{
    border-bottom:2px solid var(--line-strong);
    padding: 18px 28px;
    display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
  }
  header .title{
    font-family:'JetBrains Mono',monospace; letter-spacing:0.12em; text-transform:uppercase;
    font-size:20px; font-weight:700; color:var(--ink);
  }
  header .title span{color:var(--amber);}
  header .subtitle{color:var(--ink-muted); font-size:12.5px; letter-spacing:0.03em;}
  nav{
    display:flex; gap:2px; padding: 0 28px; border-bottom:1px solid var(--line);
    background: rgba(0,0,0,0.12);
    flex-wrap:wrap;
  }
  nav button{
    background:transparent; border:none; color:var(--ink-muted);
    padding:12px 18px; font-family:'JetBrains Mono',monospace; font-size:12.5px;
    letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
    border-bottom:2px solid transparent; transition: all .15s;
  }
  nav button:hover{color:var(--ink);}
  nav button.active{color:var(--amber); border-bottom:2px solid var(--amber);}
  main{padding: 24px 28px 60px; max-width:1360px; margin:0 auto;}
  .grid{display:grid; gap:20px;}
  .panel{
    background:var(--panel); border:1px solid var(--line-strong); border-radius:4px;
    padding:18px 20px;
  }
  .panel h2{
    font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--amber); margin:0 0 14px; padding-bottom:10px; border-bottom:1px dashed var(--line-strong);
  }
  .panel h3{font-size:13px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.06em; margin:16px 0 8px;}
  label{display:block; font-size:12px; color:var(--ink-muted); margin-bottom:4px; letter-spacing:0.02em;}
  input, select, textarea{
    background:var(--bg-2); border:1px solid var(--line-strong); color:var(--ink);
    padding:8px 10px; border-radius:3px; font-family:'Inter',sans-serif; font-size:13.5px; width:100%;
  }
  input[type=number]{font-family:'JetBrains Mono',monospace;}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--amber); outline-offset:1px;}
  button.btn{
    background:var(--amber); color:#000; border:none; padding:9px 16px; border-radius:3px;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    cursor:pointer; font-weight:700;
  }
  button.btn:hover{filter:brightness(1.08);}
  button.btn.ghost{
    background:transparent; color:var(--ink); border:1px solid var(--line-strong);
  }
  button.btn.danger{background:var(--red); color:#fff;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th, td{padding:7px 8px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle;}
  th{color:var(--ink-muted); font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em;}
  td.num, th.num{text-align:right; font-family:'JetBrains Mono',monospace;}
  .badge{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.05em;
    text-transform:uppercase; padding:2px 6px; border-radius:2px; border:1px solid;
  }
  .badge.direct{color:var(--teal); border-color:var(--teal); background:rgba(88,194,176,0.12);}
  .badge.regional{color:#f2a63d; border-color:#f2a63d; background:rgba(242,166,61,0.12);}
  .badge.global{color:#c98be0; border-color:#c98be0; background:rgba(201,139,224,0.12);}
  .badge.none{color:var(--red); border-color:var(--red); background:rgba(217,92,74,0.12);}
  .badge.mixed{color:#9fd1ff; border-color:#9fd1ff; background:rgba(159,209,255,0.12);}
  details{border:1px solid var(--line); border-radius:3px; margin-bottom:8px; background:rgba(255,255,255,0.02);}
  summary{
    padding:9px 12px; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:12px;
    letter-spacing:0.05em; text-transform:uppercase; color:var(--ink);
  }
  summary:hover{color:var(--amber);}
  .section-body{padding: 4px 14px 12px;}
  .row3{display:grid; grid-template-columns: repeat(3,1fr); gap:12px;}
  .row4{display:grid; grid-template-columns: repeat(4,1fr); gap:12px;}
  .item-row{display:grid; grid-template-columns: 1fr 90px; gap:10px; align-items:center; padding:5px 0;}
  .item-row .lbl{font-size:12.5px; color:var(--ink);}
  .item-row .lbl .unit{color:var(--ink-muted); font-size:11px;}
  .qty-row{display:grid; grid-template-columns: 1fr 70px 90px 90px 130px; gap:8px; align-items:center; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04);}
  .qty-row .lbl{font-size:12.5px;}
  .qty-row input[type=number]{padding:6px 8px;}
  .muted{color:var(--ink-muted);}
  .small{font-size:11.5px;}
  #map-wrap{position:relative;}
  #worldmap{width:100%; height:auto; display:block;}
  .marker{cursor:pointer;}
  .marker circle{transition: r .1s;}
  .marker:hover circle{filter:brightness(1.3);}
  .legend-swatch{display:inline-block; width:11px; height:11px; border-radius:50%; margin-right:6px; vertical-align:middle;}
  .empty-state{text-align:center; padding:40px 20px; color:var(--ink-muted);}
  .empty-state .big{font-family:'JetBrains Mono',monospace; font-size:15px; color:var(--ink); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:6px;}
  .totals-line{display:flex; justify-content:space-between; padding:8px 0; border-top:1px solid var(--line-strong); font-family:'JetBrains Mono',monospace; font-size:13px;}
  .totals-line.grand{font-size:16px; color:var(--amber); font-weight:700; border-top:2px solid var(--amber); margin-top:6px;}
  a.linklike{color:var(--amber); text-decoration:underline; cursor:pointer;}
  .flex-between{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  .tag-country{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-muted); border:1px solid var(--line); padding:2px 7px; border-radius:2px;}
  ::placeholder{color:#5a6a6a;}
  .save-note{font-size:11px; color:var(--ink-muted); font-style:italic;}
</style>
</head>
<body>

<header>
  <div>
    <div class="title">SI Rate Book <span>//</span> Global Coverage Plan</div>
    <div class="subtitle">Site investigation &amp; geotechnical quotation database — direct cost estimation across active markets</div>
  </div>
  <div style="display:flex; align-items:center; gap:12px;">
    <button class="btn ghost" id="export-data" style="padding:6px 12px;">Export data</button>
    <button class="btn ghost" id="import-data" style="padding:6px 12px;">Import data</button>
    <input type="file" id="import-file" accept=".json" style="display:none;">
    <div class="save-note" id="save-indicator">All data saved to this browser/account · nothing shared</div>
  </div>
</header>

<nav id="tabs">
  <button data-tab="dashboard" class="active">01 · Coverage Map</button>
  <button data-tab="quotations">02 · Quotation Log</button>
  <button data-tab="generate">03 · Generate Quote</button>
  <button data-tab="trends">04 · Price Trends</button>
  <button data-tab="settings">05 · Settings</button>
</nav>

<main id="app"></main>

/* ============================= STORAGE COMPATIBILITY SHIM ============================= */
// window.storage is provided automatically inside Claude's artifact environment.
// Outside of it (e.g. this file hosted on GitHub Pages, or opened as a local file),
// that API doesn't exist — so we fall back to localStorage here with the same
// interface, keeping this single file working in both places.
if(!window.storage){
  const LS_PREFIX = 'si-rate-book:';
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem(LS_PREFIX + key);
      if(raw===null) throw new Error('Key not found: ' + key);
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(LS_PREFIX + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(LS_PREFIX + key);
      return { key, deleted:true, shared: !!shared };
    },
    async list(prefix, shared){
      const keys = Object.keys(localStorage)
        .filter(k=>k.startsWith(LS_PREFIX + (prefix||'')))
        .map(k=>k.slice(LS_PREFIX.length));
      return { keys, prefix, shared: !!shared };
    }
  };
}

/* ============================= PRICING ENGINE ============================= */

function yearsBetween(d1, d2){
  const a = new Date(d1), b = new Date(d2);
  return (b-a) / (1000*60*60*24*365.25);
}
function inflationFor(country){
  const v = settings.inflationRates[country];
  return (v===undefined || v===null || v==='') ? settings.defaultInflation : parseFloat(v);
}
function costFactorFor(country){
  const v = settings.costFactors[country];
  return (v===undefined || v===null || v==='') ? 1 : parseFloat(v);
}
function latestDirect(country, code){
  const list = quotations.filter(q=>q.country===country && q.rates && q.rates[code]!==undefined && q.rates[code]!=='' && q.rates[code]!==null);
  if(!list.length) return null;
  list.sort((a,b)=> new Date(b.date) - new Date(a.date));
  return list[0];
}
function adjustedValueOf(rec, code, country, targetDate){
  const rate = parseFloat(rec.rates[code]);
  const yrs = Math.max(0, yearsBetween(rec.date, targetDate));
  const infl = inflationFor(country);
  return rate * Math.pow(1 + infl/100, yrs);
}
function getItemPrice(country, code, targetDate){
  const direct = latestDirect(country, code);
  if(direct){
    return { value: adjustedValueOf(direct, code, country, targetDate), source:'direct',
      detail: `Own quotation · ${direct.date}${direct.subcontractor ? ' · '+direct.subcontractor : ''}` };
  }
  const meta = getCountryMeta(country);
  const region = meta ? meta.region : null;
  if(region){
    const pool = [];
    allCountries().filter(c=>c.region===region && c.name!==country).forEach(c=>{
      const rec = latestDirect(c.name, code);
      if(rec){
        const base = adjustedValueOf(rec, code, c.name, targetDate);
        const ratio = costFactorFor(country) / costFactorFor(c.name);
        pool.push({value: base*ratio, from:c.name, date:rec.date});
      }
    });
    if(pool.length){
      const avg = pool.reduce((s,p)=>s+p.value,0)/pool.length;
      return { value: avg, source:'regional', detail: `Regional est. from ${pool.map(p=>p.from).join(', ')}` };
    }
  }
  const globalPool = [];
  allCountries().filter(c=>c.name!==country).forEach(c=>{
    const rec = latestDirect(c.name, code);
    if(rec){
      const base = adjustedValueOf(rec, code, c.name, targetDate);
      const ratio = costFactorFor(country) / costFactorFor(c.name);
      globalPool.push({value: base*ratio, from:c.name});
    }
  });
  if(globalPool.length){
    const avg = globalPool.reduce((s,p)=>s+p.value,0)/globalPool.length;
    return { value: avg, source:'global', detail: `Global est. — average of ${globalPool.length} countries with data` };
  }
  return { value:null, source:'none', detail:'No quotation data available anywhere yet' };
}
function computeCountryIndex(country, targetDate){
  if(mapMode==='single'){
    const p = getItemPrice(country, mapSingleItem, targetDate);
    return { value: p.value, coverage: p.value!=null ? '1/1' : '0/1', source: p.source };
  }
  let total=0, count=0; const sources=new Set();
  currentBasket().forEach(b=>{
    const p = getItemPrice(country, b.code, targetDate);
    if(p.value!=null){ total += p.value*b.qty; count++; sources.add(p.source); }
  });
  let overall='none';
  if(sources.size){
    if(sources.has('direct') && sources.size===1) overall='direct';
    else if(sources.size>1) overall='mixed';
    else overall = [...sources][0];
  }
  return { value: count? total : null, coverage: `${count}/${currentBasket().length}`, source: overall };
}

/* ============================= DASHBOARD ============================= */

function project(lat, lon){
  const x = (lon+180)/360*1000;
  const y = (90-lat)/180*500;
  return [x,y];
}
function colorForValue(v, min, max){
  if(v==null) return '#5a6a6a';
  const t = max>min ? (v-min)/(max-min) : 0.5;
  // teal (low) -> amber (mid) -> red (high)
  if(t<0.5){
    const k = t/0.5;
    return lerpColor('#58c2b0','#f2a63d',k);
  } else {
    const k = (t-0.5)/0.5;
    return lerpColor('#f2a63d','#d95c4a',k);
  }
}
function lerpColor(c1,c2,t){
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a[0]+(b[0]-a[0])*t);
  const g = Math.round(a[1]+(b[1]-a[1])*t);
  const bl = Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g},${bl})`;
}
function hexToRgb(hex){
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

  const min = values.length? Math.min(...values): 0;
  const max = values.length? Math.max(...values): 1;

  const regionLabels = {

  };

  let markers = '';
  indices.forEach(c=>{
    const [x,y] = project(c.lat, c.lon);
    const color = colorForValue(c.idx.value, min, max);
    const hasAny = c.idx.value!=null;
    const r = hasAny ? 7 + 5*( (c.idx.value-min)/((max-min)||1) ) : 6;
    const dash = c.idx.source==='direct' ? '' : (hasAny ? 'stroke-dasharray="3,2"' : 'stroke-dasharray="2,2"');
    const fill = hasAny ? color : 'none';
    markers += `<g class="marker" data-country="${c.name}" transform="translate(${x},${y})">

function updateGenerateResults(){
  if(!genState.country){ return; }
  const target = genState.targetDate || new Date().toISOString().slice(0,10);
  let grand = 0;
  SECTIONS.forEach(sec=>{
    let subtotal = 0;
    BOQ.filter(b=>b.section===sec).forEach(it=>{
      const qty = parseFloat(genState.qty[it.code]) || 0;
      const p = getItemPrice(genState.country, it.code, target);
      const rateCell = document.querySelector(`[data-rate-cell="${it.code}"]`);
      const srcCell = document.querySelector(`[data-src-cell="${it.code}"]`);
      const amtCell = document.querySelector(`[data-amt-cell="${it.code}"]`);
      if(rateCell) rateCell.textContent = p.value!=null ? p.value.toFixed(2) : '—';
      if(srcCell){ srcCell.textContent = p.source; srcCell.className = `badge ${p.source}`; srcCell.title = p.detail; }
      const amt = (p.value!=null) ? qty*p.value : 0;
      if(amtCell) amtCell.textContent = qty>0 ? amt.toFixed(2) : '—';
      subtotal += amt;
    });
    grand += subtotal;
    const subEl = document.querySelector(`[data-subtotal="${CSS.escape(sec)}"] span:last-child`);
    if(subEl) subEl.textContent = '$'+subtotal.toFixed(2);
  });

  if(g) g.textContent = '$'+grand.toFixed(2);
}

function exportCSV(){
  if(!genState.country){ alert('Select a country and click Calculate first.'); return; }
  const target = genState.targetDate || new Date().toISOString().slice(0,10);
  let lines = [['Section','Code','Description','Unit','Qty','Rate','Source','Amount'].join(',')];
  BOQ.forEach(it=>{
    const qty = parseFloat(genState.qty[it.code]) || 0;
    if(qty<=0) return;
    const p = getItemPrice(genState.country, it.code, target);
    const amt = p.value!=null ? qty*p.value : 0;
    lines.push([it.section, it.code, `"${it.label.replace(/"/g,'""')}"`, it.unit, qty, p.value!=null?p.value.toFixed(2):'', p.source, amt.toFixed(2)].join(','));
  });
  const blob = new Blob([lines.join('\\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `quotation_${genState.country.replace(/\\s+/g,'_')}_${target}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

/* ============================= PRICE TREND ANALYSIS ============================= */
// Two distinct questions, kept deliberately separate so one doesn't contaminate the other:
//
// 1) TIME TREND (same site-access tag, different dates): how much has this country's
//    pricing for an item actually moved, annualized — compared against the inflation %
//    you've set for that country. A gap here is "unexplained escalation" (market/
//    subcontractor pricing power beyond CPI), NOT site sensitivity, because access type
//    is held constant across the comparison.
//
// 2) SITE-SENSITIVITY PREMIUM (same or overlapping dates, different site-access tags):
//    how much more a restricted/urban/remote/offshore site costs vs a standard site for
//    the same item in the same country. This isolates the access-difficulty effect from
//    the passage of time.
//
// Both require you to have tagged quotations with a site access type — the tool cannot
// infer "this was an airport" from a number alone.

function itemQuotesFor(country, code){
  return quotations
    .filter(q=>q.country===country && q.rates && q.rates[code]!=null && q.rates[code]!=='')
    .map(q=>({date:q.date, rate:parseFloat(q.rates[code]), access:q.siteAccess||'standard', sub:q.subcontractor}))
    .sort((a,b)=> new Date(a.date)-new Date(b.date));
}

function analyzeTimeTrend(country){
  // For each item code with >=2 quotes sharing the SAME access tag, compute annualized growth
  // between the earliest and latest such quote, then compare to the set inflation rate.
  const results = [];
  BOQ.forEach(it=>{
    const pts = itemQuotesFor(country, it.code);
    if(pts.length < 2) return;
    const byAccess = {};
    pts.forEach(p=>{ (byAccess[p.access] = byAccess[p.access]||[]).push(p); });
    Object.entries(byAccess).forEach(([access, list])=>{
      if(list.length < 2) return;
      const first = list[0], last = list[list.length-1];
      const yrs = yearsBetween(first.date, last.date);
      if(yrs <= 0.05) return;
      const cagr = (Math.pow(last.rate/first.rate, 1/yrs) - 1) * 100;
      results.push({
        code: it.code, label: it.label, access,
        firstDate:first.date, firstRate:first.rate, lastDate:last.date, lastRate:last.rate,
        years: yrs, observedPct: cagr
      });
    });
  });
  if(!results.length) return null;
  const avgObserved = results.reduce((s,r)=>s+r.observedPct,0)/results.length;
  const setInflation = inflationFor(country);
  return { rows: results, avgObserved, setInflation, gap: avgObserved - setInflation };
}

function analyzeSensitivityPremium(country){
  // For each item, compare average rate for non-standard access tags vs standard,
  // regardless of date (uses whatever quotes exist), expressed as % premium.
  const perAccess = {}; // access -> array of {code, ratio}
  BOQ.forEach(it=>{
    const pts = itemQuotesFor(country, it.code);
    const standard = pts.filter(p=>p.access==='standard');
    if(!standard.length) return;
    const avgStandard = standard.reduce((s,p)=>s+p.rate,0)/standard.length;
    SITE_ACCESS.filter(a=>a.key!=='standard').forEach(a=>{
      const matches = pts.filter(p=>p.access===a.key);
      if(!matches.length) return;
      const avgMatch = matches.reduce((s,p)=>s+p.rate,0)/matches.length;
      const premiumPct = (avgMatch/avgStandard - 1) * 100;
      (perAccess[a.key] = perAccess[a.key]||[]).push({code:it.code, label:it.label, premiumPct, n:matches.length});
    });
  });
  const summary = Object.entries(perAccess).map(([key, rows])=>({
    access:key,
    label: SITE_ACCESS.find(a=>a.key===key).label,
    avgPremium: rows.reduce((s,r)=>s+r.premiumPct,0)/rows.length,
    itemCount: rows.length,
    rows
  }));
  return summary.length ? summary : null;
}

function renderTrends(){
  const countriesWithMultiple = allCountries()
    .map(c=>c.name)
    .filter(name => quotations.filter(q=>q.country===name).length >= 2);

  if(!countriesWithMultiple.length){
    return `<div class="panel"><div class="empty-state"><div class="big">Not enough data yet</div>
      This analysis needs at least 2 logged quotations for the same country — ideally the same items,
      quoted at different dates and/or tagged with different site access types.
      Add more entries in the <a class="linklike" data-goto="quotations">Quotation Log</a>.</div></div>`;
  }

  let html = `<div class="panel"><h2>Price Trend Analysis</h2>
    <p class="small muted">This splits an observed price increase into two separate effects: how much is explained by the
    inflation % you've set for the country (time trend, same site-access tag), versus how much is a site-sensitivity premium
    (same time period, different access tag — e.g. airport/restricted vs standard). Both rely entirely on the
    <span class="mono">Site access type</span> tag you set when logging each quotation.</p></div>`;

  countriesWithMultiple.forEach(country=>{
    const trend = analyzeTimeTrend(country);
    const premium = analyzeSensitivityPremium(country);
    const meta = getCountryMeta(country);

    let trendHtml = '';
    if(trend){
      const gapFlag = Math.abs(trend.gap) < 2 ? 'direct' : (trend.gap>0 ? 'regional' : 'global');
      trendHtml = `<h3>Time trend (same site-access tag) — observed vs. set inflation</h3>
        <table><thead><tr><th>Item</th><th>Access</th><th>First</th><th>Latest</th><th class="num">Yrs</th><th class="num">Observed CAGR</th></tr></thead><tbody>
        ${trend.rows.map(r=>`<tr><td>${r.label}</td><td class="small">${SITE_ACCESS.find(a=>a.key===r.access).label}</td>
          <td class="small">${r.firstDate}: ${r.firstRate.toFixed(2)}</td><td class="small">${r.lastDate}: ${r.lastRate.toFixed(2)}</td>
          <td class="num">${r.years.toFixed(1)}</td><td class="num">${r.observedPct.toFixed(1)}%</td></tr>`).join('')}
        </tbody></table>
        <div class="totals-line"><span>Average observed escalation (same access type)</span><span>${trend.avgObserved.toFixed(1)}%/yr</span></div>
        <div class="totals-line"><span>Inflation currently set for ${country}</span><span>${trend.setInflation.toFixed(1)}%/yr</span></div>
        <div class="totals-line grand"><span>Unexplained gap</span><span><span class="badge ${gapFlag}">${trend.gap>=0?'+':''}${trend.gap.toFixed(1)} pts/yr</span></span></div>
        <p class="small muted">A gap near zero means the inflation % you've set already explains what you're seeing — no action needed.
        A large positive gap (comparisons above use the <em>same</em> access tag, so this isn't a site-sensitivity artifact) suggests this
        country's real cost escalation is running ahead of CPI — worth raising the inflation % in Settings.
        A negative gap suggests you may be over-escalating relative to what subcontractors are actually charging.</p>`;
    } else {
      trendHtml = `<p class="small muted">Not enough same-access-tag repeat quotes yet to compute a time trend for ${country} — needs the same item quoted twice, with the same site access tag, at different dates.</p>`;
    }

    let premiumHtml = '';
    if(premium){
      premiumHtml = `<h3>Site-sensitivity premium (vs. standard-access sites)</h3>
        <table><thead><tr><th>Access type</th><th class="num">Avg premium</th><th class="num">Items compared</th></tr></thead><tbody>
        ${premium.map(p=>`<tr><td>${p.label}</td><td class="num">${p.avgPremium>=0?'+':''}${p.avgPremium.toFixed(1)}%</td><td class="num">${p.itemCount}</td></tr>`).join('')}
        </tbody></table>
        <p class="small muted">This is the average extra (or lower) cost seen for that access type vs. standard-access quotes for the
        same items in ${country}, independent of when each was quoted. Use it in <a class="linklike" data-goto="generate">Generate Quote</a> as a
        manual loading on top of the base estimate when you know the job is at a sensitive site.</p>`;
    } else {
      premiumHtml = `<p class="small muted">No standard-vs-restricted comparison available yet for ${country} — needs at least one quotation tagged "Standard / open site" and one tagged with another access type, for the same item.</p>`;
    }

    html += `<div class="panel" style="margin-top:16px;">
      <h2 style="border:none; padding:0; margin-bottom:10px;">${country} <span class="tag-country">${meta?meta.region:''}</span></h2>
      ${trendHtml}
      ${premiumHtml}
    </div>`;
  });

  return html;
}

/* ============================= EVENT HANDLERS ============================= */

function attachHandlers(){
  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentTab = el.dataset.goto;
      document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===currentTab));
      render();
    });
  });

  if(currentTab==='dashboard'){
    document.querySelectorAll('.marker').forEach(m=>{
      m.addEventListener('click', ()=>{ selectedMapCountry = m.dataset.country; render(); });
    });
    const closeBtn = document.querySelector('[data-close-detail]');
    if(closeBtn) closeBtn.addEventListener('click', ()=>{ selectedMapCountry=null; render(); });
    const modeBasketBtn = document.getElementById('mode-basket');
    const modeSingleBtn = document.getElementById('mode-single');
    if(modeBasketBtn) modeBasketBtn.addEventListener('click', ()=>{ mapMode='basket'; render(); });
    if(modeSingleBtn) modeSingleBtn.addEventListener('click', ()=>{ mapMode='single'; render(); });
    const itemSelect = document.getElementById('single-item-select');
    if(itemSelect) itemSelect.addEventListener('change', ()=>{ mapSingleItem = itemSelect.value; render(); });
  }

  if(currentTab==='quotations'){
    const saveBtn = document.getElementById('save-quote');
    if(saveBtn) saveBtn.addEventListener('click', async ()=>{
      const country = document.getElementById('q-country').value.trim();
      if(!country){ alert('Enter a country.'); return; }
      const date = document.getElementById('q-date').value;
      const currency = document.getElementById('q-currency').value;
      const subcontractor = document.getElementById('q-sub').value.trim();
      const notes = document.getElementById('q-notes').value.trim();
      const siteAccess = document.getElementById('q-access').value;
      const rates = {};
      document.querySelectorAll('[data-rate-input]').forEach(inp=>{
        if(inp.value!=='' ) rates[inp.dataset.rateInput] = parseFloat(inp.value);
      });
      if(!getCountryMeta(country)){
        customCountries.push({name:country, region:'Unassigned', lat:0, lon:0});
        await saveCountries();
      }
      if(editingQuoteId!=null){
        const q = quotations.find(x=>x.id===editingQuoteId);
        Object.assign(q, {country,date,currency,subcontractor,notes,siteAccess,rates});
      } else {
        quotations.push({id: Date.now(), country, date, currency, subcontractor, notes, siteAccess, rates});
      }
      editingQuoteId = null;
      await saveQuotations();
      render();
    });
    const cancelBtn = document.getElementById('cancel-edit');
    if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingQuoteId=null; render(); });

    document.querySelectorAll('[data-edit-quote]').forEach(el=>{
      el.addEventListener('click', ()=>{ editingQuoteId = parseInt(el.dataset.editQuote); render(); });
    });
    document.querySelectorAll('[data-del-quote]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        if(confirm('Delete this quotation?')){
          quotations = quotations.filter(q=>q.id!==parseInt(el.dataset.delQuote));
          await saveQuotations(); render();
        }
      });
    });
  }

  if(currentTab==='generate'){
    const countryInput = document.getElementById('g-country');
    const dateInput = document.getElementById('g-date');
    const accessInput = document.getElementById('g-access');
    countryInput.addEventListener('change', ()=>{ genState.country = countryInput.value.trim(); });
    dateInput.addEventListener('change', ()=>{ genState.targetDate = dateInput.value; });
    accessInput.addEventListener('change', ()=>{ genState.siteAccess = accessInput.value; showAccessAdvisory(); });
    document.getElementById('run-quote').addEventListener('click', ()=>{
      genState.country = countryInput.value.trim();
      genState.targetDate = dateInput.value;
      genState.siteAccess = accessInput.value;
      if(!genState.country || !getCountryMeta(genState.country)){ alert('Select a valid country from the list.'); return; }
      updateGenerateResults();
      showAccessAdvisory();
    });
    document.querySelectorAll('[data-qty-input]').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        genState.qty[inp.dataset.qtyInput] = inp.value;
        if(genState.country) updateGenerateResults();
      });
    });
    document.getElementById('export-csv').addEventListener('click', exportCSV);
    if(genState.country){ updateGenerateResults(); showAccessAdvisory(); }
  }

  if(currentTab==='settings'){
    document.getElementById('load-reference-infl').addEventListener('click', ()=>{
      let loaded=0, skipped=0;
      document.querySelectorAll('[data-infl]').forEach(inp=>{
        const ref = REFERENCE_INFLATION[inp.dataset.infl];
        if(ref){ inp.value = ref.v; loaded++; } else { skipped++; }
      });
      alert(`Loaded ${loaded} reference inflation values into the fields below.\\n${skipped} countries have no reliable recent figure (e.g. Syria, Yemen, Sudan, DR Congo, Myanmar) and were left as-is — set those manually if you have better data.\\n\\nNothing is saved yet — review, edit, then click Save Settings.`);
    });
    document.getElementById('save-settings').addEventListener('click', async ()=>{
      settings.defaultInflation = parseFloat(document.getElementById('default-infl').value) || 3;
      document.querySelectorAll('[data-infl]').forEach(inp=>{
        if(inp.value!=='') settings.inflationRates[inp.dataset.infl] = parseFloat(inp.value);
        else delete settings.inflationRates[inp.dataset.infl];
      });
      document.querySelectorAll('[data-factor]').forEach(inp=>{
        if(inp.value!=='') settings.costFactors[inp.dataset.factor] = parseFloat(inp.value);
        else delete settings.costFactors[inp.dataset.factor];
      });
      await saveSettings();
      alert('Settings saved.');
    });
    document.getElementById('add-country').addEventListener('click', async ()=>{
      const name = document.getElementById('nc-name').value.trim();
      const region = document.getElementById('nc-region').value.trim();
      const lat = parseFloat(document.getElementById('nc-lat').value);
      const lon = parseFloat(document.getElementById('nc-lon').value);
      if(!name || !region || isNaN(lat) || isNaN(lon)){ alert('Fill in all fields.'); return; }
      if(getCountryMeta(name)){ alert('That country already exists.'); return; }
      customCountries.push({name, region, lat, lon});
      await saveCountries();
      render();
    });
    document.querySelectorAll('[data-del-country]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        customCountries = customCountries.filter(c=>c.name!==el.dataset.delCountry);
        await saveCountries(); render();
      });
    });
    document.getElementById('save-basket').addEventListener('click', async ()=>{
      const basket = [];
      document.querySelectorAll('[data-basket-qty]').forEach(inp=>{
        const qty = parseFloat(inp.value);
        if(qty > 0) basket.push({code: inp.dataset.basketQty, qty});
      });
      if(!basket.length){ alert('Select at least one item with a quantity greater than 0.'); return; }
      settings.referenceBasket = basket;
      await saveSettings();
      alert(`Basket saved — ${basket.length} item(s). The Coverage Map will use this next time you open it.`);
    });
  }
}

/* ============================= EXPORT / IMPORT ============================= */

function exportAllData(){
  const payload = {
    app: 'si-rate-book',
    version: 1,
    exportedAt: new Date().toISOString(),
    quotations, customCountries, settings
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `si-rate-book-backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importAllData(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    let payload;
    try{ payload = JSON.parse(e.target.result); }
    catch(err){ alert('This file is not a valid backup file (could not read it as JSON).'); return; }
    if(!payload || payload.app!=='si-rate-book' || !Array.isArray(payload.quotations)){
      alert('This file does not look like an SI Rate Book backup. Import cancelled — nothing was changed.');
      return;
    }
    const incoming = payload.quotations.length;
    const current = quotations.length;
    const mode = current === 0 ? 'replace' :
      (confirm(`This device currently has ${current} quotation(s). The backup file contains ${incoming}.\n\nOK = MERGE (add the backup's quotations to what's here, skipping exact duplicates)\nCancel = REPLACE (wipe this device's data and use only the backup)`) ? 'merge' : 'replace');
    if(mode==='replace'){
      quotations = payload.quotations;
      customCountries = payload.customCountries || [];
      settings = payload.settings || settings;
    } else {
      const existingIds = new Set(quotations.map(q=>q.id));
      payload.quotations.forEach(q=>{
        if(!existingIds.has(q.id)) quotations.push(q);
      });
      (payload.customCountries||[]).forEach(c=>{
        if(!getCountryMeta(c.name)) customCountries.push(c);
      });
      // settings: incoming fills gaps only, existing values on this device win
      const inc = payload.settings || {};
      settings.inflationRates = Object.assign({}, inc.inflationRates||{}, settings.inflationRates);
      settings.costFactors = Object.assign({}, inc.costFactors||{}, settings.costFactors);
      if(settings.referenceBasket==null && inc.referenceBasket) settings.referenceBasket = inc.referenceBasket;
    }
    await saveQuotations(); await saveCountries(); await saveSettings();
    alert(`Import complete — ${quotations.length} quotation(s) now on this device.`);
    render();
  };
  reader.readAsText(file);
}

/* ============================= INIT ============================= */

(async function init(){
  await loadAll();
  document.getElementById('export-data').addEventListener('click', exportAllData);
  document.getElementById('import-data').addEventListener('click', ()=>document.getElementById('import-file').click());
  document.getElementById('import-file').addEventListener('change', (e)=>{
    if(e.target.files && e.target.files[0]){ importAllData(e.target.files[0]); e.target.value=''; }
  });
  render();
})();
</script>
